version: "3.9"

networks:
  fraud-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  neo4j-data:
  kafka-data:

services:
  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: fraud-postgres
    env_file: .env.infra
    environment:
      POSTGRES_DB: fraudshield
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - fraud-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d fraudshield"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fraud-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - fraud-net
    deploy:
      resources:
        limits:
          memory: 320M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: fraud-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - fraud-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fraud-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "9092:9092"
    networks:
      - fraud-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      retries: 10

  neo4j:
    image: neo4j:5.20
    container_name: fraud-neo4j
    env_file: .env.infra
    environment:
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_allowlist: apoc.algo.*,apoc.meta.*
    volumes:
      - neo4j-data:/data
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - fraud-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      retries: 10

  # ── Application Services ──────────────────────────────────────────────────

  api:
    build:
      context: ../services/api
      dockerfile: Dockerfile
    container_name: fraud-api
    env_file: .env.services
    environment:
      NODE_ENV: production
      PORT: 3001
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      RISK_ENGINE_URL: http://risk-engine:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "3001:3001"
    networks:
      - fraud-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: unless-stopped

  risk-engine:
    build:
      context: ../services/risk-engine
      dockerfile: Dockerfile
    container_name: fraud-risk-engine
    env_file: .env.services
    environment:
      PORT: 8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8001"
    networks:
      - fraud-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: unless-stopped

  graph-engine:
    build:
      context: ../services/graph-engine
      dockerfile: Dockerfile
    container_name: fraud-graph-engine
    env_file: .env.services
    environment:
      NEO4J_URI: bolt://neo4j:7687
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PORT: 8002
    depends_on:
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8002:8002"
    networks:
      - fraud-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: unless-stopped

  dashboard:
    image: nginx:1.26-alpine
    container_name: fraud-dashboard
    volumes:
      - ../dashboard/dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - fraud-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    restart: unless-stopped

  # ── Device Binding Service ────────────────────────────────────────────────

  device-binding-service:
    build:
      context: ../services/device-binding
      dockerfile: Dockerfile
    container_name: fraud-device-binding
    env_file: .env.services
    environment:
      NODE_ENV: production
      PORT: 3002
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: payguard_devices
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3002:3002"
    networks:
      - fraud-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
